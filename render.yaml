# Configuração para publicar na Render (alternativa à Vercel)
# Na Render: New > Blueprint > selecione este repositório.
# Ela vai pedir os valores marcados como "sync: false" (os secretos).
services:
  - type: web
    name: barbara-croche
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: barbara
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
